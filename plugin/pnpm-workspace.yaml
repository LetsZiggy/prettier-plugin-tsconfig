#$schema: 'https://www.schemastore.org/pnpm-workspace.json'

overrides:
  prettier-plugin-tsconfig: link:..

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  lmdb: true
  msgpackr-extract: true
  unrs-resolver: true

# installs any missing peer dependencies as dev dependencies
autoInstallPeers: true

# for pnpm, use flat node_modules
shamefullyHoist: true
